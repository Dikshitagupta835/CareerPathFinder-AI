name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - master # Triggers on push to master branch

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # GCP Project ID
  REGION: us-central1                        # Target Region
  SERVICE_NAME: career-pathfinder            # Cloud Run service name
  AR_REPO: career-pathfinder-repo            # Artifact Registry repository name

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          # Pass environment variables to Cloud Run (like Gemini API Key)
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NODE_ENV=production
          # Allow unauthenticated (public) access for a public demo
          flags: --allow-unauthenticated
